services:
  - type: web
    name: skin-scan-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn src.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_IMAGE_SIZE
        value: 2048
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AWS_BEARER_TOKEN_BEDROCK
        sync: false
